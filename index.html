<html lang="en">
<head>

    <meta property="og:title" content="Screen Resolution — DevKit Tools">
    <meta property="og:description" content="Check your screen resolution, viewport size, pixel ratio, and color depth instantly.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <title>Screen Resolution — DevKit Tools</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #3fb950;
            --danger: #f85149;
            --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 16px; }
        .header a:hover { color: var(--accent); }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f0f6fc;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #f0f6fc;
        }
        textarea, input[type="text"], input[type="number"], select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            resize: vertical;
            transition: border-color 0.15s;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        button {
            background: #238636;
            color: #fff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: var(--radius);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2ea043; }
        button.secondary {
            background: var(--surface);
            border: 1px solid var(--border);
        }
        button.secondary:hover { background: #30363d; }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .feature-tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .output {
            margin-top: 16px;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 12px;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .copied { color: var(--success); font-size: 12px; margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
        .copied.show { opacity: 1; }
        .label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}    </style>
</head>
<body>
    <div class="header">
        <a href="https://479464887-rgb.github.io/devkit-site/">← DevKit Tools</a>
        <span style="color:var(--text-secondary);font-size:13px">Screen Resolution</span>
    </div>
    <div class="container">
        <h1>Screen Resolution</h1>
        <p class="subtitle">Check your screen resolution, viewport size, pixel ratio, and color depth instantly.</p>
        <div class="features">
            <span class="feature-tag">Real-time detection</span>
            <span class="feature-tag">Device pixel ratio</span>
            <span class="feature-tag">Color depth</span>
            <span class="feature-tag">Orientation</span>
        </div>
        <div class="card">
            <h2>Tool</h2>
            <div id="tool-area">
                
<div id="res-info"></div>

            <script>

const info = document.getElementById('res-info');

function detect() {
    const w = window.screen.width * window.devicePixelRatio;
    const h = window.screen.height * window.devicePixelRatio;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const dpr = window.devicePixelRatio;
    const depth = window.screen.colorDepth;
    const orient = window.screen.orientation?.type || 'unknown';
    const availW = window.screen.availWidth;
    const availH = window.screen.availHeight;
    
    info.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px;">
            <div style="padding:12px;background:var(--bg);border-radius:var(--radius);"><div style="color:var(--text-secondary);font-size:11px;">Screen Resolution</div><div style="font-size:18px;font-weight:600;">${w} × ${h}</div></div>
            <div style="padding:12px;background:var(--bg);border-radius:var(--radius);"><div style="color:var(--text-secondary);font-size:11px;">Viewport Size</div><div style="font-size:18px;font-weight:600;">${vw} × ${vh}</div></div>
            <div style="padding:12px;background:var(--bg);border-radius:var(--radius);"><div style="color:var(--text-secondary);font-size:11px;">Pixel Ratio</div><div style="font-size:18px;font-weight:600;">${dpr}x</div></div>
            <div style="padding:12px;background:var(--bg);border-radius:var(--radius);"><div style="color:var(--text-secondary);font-size:11px;">Color Depth</div><div style="font-size:18px;font-weight:600;">${depth}-bit</div></div>
            <div style="padding:12px;background:var(--bg);border-radius:var(--radius);"><div style="color:var(--text-secondary);font-size:11px;">Available</div><div style="font-size:14px;">${availW} × ${availH}</div></div>
            <div style="padding:12px;background:var(--bg);border-radius:var(--radius);"><div style="color:var(--text-secondary);font-size:11px;">Orientation</div><div style="font-size:14px;">${orient}</div></div>
        </div>
        <div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:var(--radius);font-family:monospace;font-size:12px;color:var(--text-secondary);">
            User Agent: ${navigator.userAgent}
        </div>
    `;
}

detect();
window.addEventListener('resize', detect);
window.matchMedia('(orientation: portrait)').addEventListener('change', detect);

            </script>
            </div>
        </div>
    </div>
    <div class="footer">
        <a href="https://479464887-rgb.github.io/devkit-site/privacy.html">Privacy</a> ·
        <a href="https://479464887-rgb.github.io/devkit-site/terms.html">Terms</a> ·
        © 2026 DevKit Tools
    </div>
    <script>
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }
    </script>
</body>
</html>
